<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#022c22">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Casa de Repouso">
  <title>Casa de Repouso 2026</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./app.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="row-between">
        <h1 class="app-title"><span class="trophy">🏆</span> Casa de Repouso</h1>
        <div id="seg-escopo" class="segmented">
          <button data-escopo="temporada" class="active">2026</button>
          <button data-escopo="lifetime">Lifetime</button>
        </div>
      </div>
      <p class="app-subtitle" id="subtitle">Carregando…</p>
    </header>

    <main id="main-content">
      <div class="loading">
        <div class="spinner"></div>
        <div class="muted">Carregando dados…</div>
      </div>
    </main>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-aba="placar">
      <svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
      Placar
    </button>
    <button class="nav-btn" data-aba="registrar">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Registrar
    </button>
    <button class="nav-btn" data-aba="jogadores">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Jogadores
    </button>
    <button class="nav-btn" data-aba="historico">
      <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
      Histórico
    </button>
    <button class="nav-btn" data-aba="insights">
      <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
      Insights
    </button>
  </nav>

  <div id="toast" class="toast"></div>

  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <p id="modal-texto"></p>
      <div class="modal-btns">
        <button id="modal-cancelar" class="btn-modal-cancel">Cancelar</button>
        <button id="modal-confirmar" class="btn-modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
